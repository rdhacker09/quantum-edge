# Bybit AI vs Human 1v1 Trading Bot - V2 PRO Config
# =====================================================

# Exchange settings
exchange:
  network: testnet  # TESTNET for demo testing
  category: linear  # USDT perpetuals

# Trading pairs - high liquidity majors
trading:
  symbols:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
    - BNBUSDT
    - XRPUSDT
    - DOGEUSDT
    - AVAXUSDT
    - LINKUSDT
  timeframes:
    - 5      # 5m for entries
    - 15     # 15m for confirmation  
    - 60     # 1h for trend
  max_open_positions: 4      # Max concurrent positions
  min_trades_per_day: 12     # Trading minimum + buffer

# Leverage (max 15x per trading rules)
leverage:
  min_leverage: 3
  max_leverage: 15    # HARD LIMIT for trading
  default_leverage: 8
  dynamic: true       # Adjust based on volatility/confidence

# Risk Management - DCA SMART SIZING
risk:
  # DCA-style margin tiers (based on signal strength)
  min_margin: 50          # Weak signals (score 5-6)
  mid_margin: 100         # Medium signals (score 7-8)
  max_margin: 150         # Strong signals (score 9+)
  # SMC signals (Order Block, CHoCH) = automatic tier upgrade
  max_daily_drawdown: 8.0 # Stop trading if down 8%
  min_capital: 1000       # Trading minimum

# Position sizing (DCA-style)
position:
  size_method: dca_smart   # DCA based on signal strength
  min_margin_usdt: 50      # Minimum margin per trade
  max_margin_usdt: 150     # Maximum margin per trade

# Stop Loss / Take Profit
stops:
  use_atr_stops: true
  atr_stop_multiplier: 2.0    # 2x ATR stop loss
  atr_tp_multiplier: 3.0      # 3x ATR take profit (1.5:1 RR)
  trailing_stop: true
  trailing_activation_pct: 1.5   # Activate at 1.5% profit
  trailing_distance_pct: 1.0     # Trail 1% behind

# Strategy parameters - OPTIMIZED
strategy:
  # RSI settings
  rsi_period: 14
  rsi_oversold: 30
  rsi_overbought: 70
  
  # MACD settings
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  
  # Bollinger Bands
  bb_period: 20
  bb_std: 2.0
  
  # Volume
  volume_ma_period: 20
  volume_spike_multiplier: 1.5
  
  # Trend EMAs
  ema_fast: 9
  ema_slow: 21
  trend_ema: 50
  
  # Signal thresholds
  min_confidence: 0.55    # Minimum confidence to consider
  min_signal_score: 5     # Min indicators agreeing

# ML Model settings
ml:
  enabled: true
  retrain_samples: 100    # Retrain after this many trades
  lookback_periods: 100

# Notifications (optional - TG alerts)
notifications:
  telegram:
    enabled: false
    chat_id: ""
    bot_token: ""

# Logging
logging:
  level: INFO
  console: true
  file: true
  trade_log: true  # Detailed trade log for trading audit
